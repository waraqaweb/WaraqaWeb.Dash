name: Deploy to DigitalOcean Droplet

on:
  workflow_run:
    workflows: ["Build & Push Docker Images (GHCR)"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-do-droplet
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        shell: bash
        env:
          DO_HOST: ${{ vars.DO_HOST }}
          DO_USER: ${{ vars.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_APP_DIR: ${{ vars.DO_APP_DIR }}
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${DO_HOST:-}" ]] || missing+=(DO_HOST)
          [[ -n "${DO_USER:-}" ]] || missing+=(DO_USER)
          [[ -n "${DO_SSH_KEY:-}" ]] || missing+=(DO_SSH_KEY)
          [[ -n "${DO_APP_DIR:-}" ]] || missing+=(DO_APP_DIR)

          if (( ${#missing[@]} > 0 )); then
            echo "Missing required GitHub Actions configuration: ${missing[*]}"
            echo "Set DO_SSH_KEY as a Repository secret."
            echo "Set DO_HOST, DO_USER, and DO_APP_DIR as Repository variables."
            exit 1
          fi

          echo "Deploy secret preflight passed."
          echo "Remote host is configured."
          echo "Remote user is configured."
          echo "Remote app dir secret is configured as: ${DO_APP_DIR}"

      - name: Prepare SSH
        shell: bash
        env:
          DO_HOST: ${{ vars.DO_HOST }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "${DO_SSH_KEY}" | tr -d '\r' > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key
          ssh-keyscan -H "${DO_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "SSH key prepared."
          echo "Known hosts entry added for ${DO_HOST}."

      - name: Test SSH connectivity
        shell: bash
        env:
          DO_HOST: ${{ vars.DO_HOST }}
          DO_USER: ${{ vars.DO_USER }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/do_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=yes \
            "${DO_USER}@${DO_HOST}" \
            'echo "[ssh] host=$(hostname)"; echo "[ssh] user=$(id -un 2>/dev/null || whoami)"; echo "[ssh] ok"'

      - name: Deploy via SSH
        shell: bash
        env:
          DO_HOST: ${{ vars.DO_HOST }}
          DO_USER: ${{ vars.DO_USER }}
          DO_APP_DIR: ${{ vars.DO_APP_DIR }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
        run: |
          set -euo pipefail

          DEPLOY_SHA="${WORKFLOW_RUN_SHA:-}"
          BUILD_VERSION_VALUE="${WORKFLOW_RUN_NUMBER:-${GITHUB_RUN_NUMBER}}"

          if [ -n "${DEPLOY_SHA}" ]; then
            echo "[deploy] Preparing pull-based deploy for sha=${DEPLOY_SHA}"
          else
            echo "[deploy] No workflow_run SHA provided; falling back to current origin/main"
          fi

          ssh -i ~/.ssh/do_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=yes \
            "${DO_USER}@${DO_HOST}" "DO_APP_DIR='${DO_APP_DIR}' BUILD_VERSION='${BUILD_VERSION_VALUE}' DEPLOY_SHA='${DEPLOY_SHA}' bash -se" <<'EOF'
          set -euo pipefail

          APP_DIR="${DO_APP_DIR}"

          echo "[deploy] Remote preflight starting"
          echo "[deploy] host=$(hostname)"
          echo "[deploy] user=$(id -un 2>/dev/null || whoami)"
          echo "[deploy] app_dir=${APP_DIR}"
          echo "[deploy] current_dir=$(pwd)"

          if [ ! -d "${APP_DIR}" ]; then
            echo "[deploy] ERROR: DO_APP_DIR does not exist: ${APP_DIR}"
            echo "[deploy] Parent directory listing:"
            ls -la "$(dirname "${APP_DIR}")" || true
            echo "[deploy] /opt listing:"
            ls -la /opt || true
            exit 1
          fi

          cd "${APP_DIR}"

          echo "[deploy] entered_dir=$(pwd)"

          if [ ! -d .git ]; then
            echo "[deploy] ERROR: ${APP_DIR} is not a git repository"
            echo "[deploy] Directory contents:"
            ls -la
            exit 1
          fi

          if [ ! -f deploy/scripts/deploy.sh ]; then
            echo "[deploy] ERROR: deploy/scripts/deploy.sh not found in ${APP_DIR}"
            echo "[deploy] Directory contents:"
            ls -la
            echo "[deploy] deploy/ contents:"
            ls -la deploy || true
            exit 1
          fi

          echo "[deploy] git_head_before=$(git rev-parse --short HEAD)"
          echo "[deploy] git_branch=$(git rev-parse --abbrev-ref HEAD)"

          export BUILD_VERSION="${BUILD_VERSION}"
          export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [ -n "${DEPLOY_SHA:-}" ]; then
            export TARGET_REF="${DEPLOY_SHA}"
            export DEPLOY_IMAGE_TAG="${DEPLOY_SHA}"
            echo "[deploy] using immutable image tag ${DEPLOY_IMAGE_TAG}"
          fi

          chmod +x deploy/scripts/deploy.sh || true

          echo "[deploy] running deploy/scripts/deploy.sh pull"
          deploy/scripts/deploy.sh pull

          echo "[deploy] git_head_after=$(git rev-parse --short HEAD)"
          echo "[deploy] pruning old docker images"
          docker image prune -f --filter "until=168h" || true

          echo "[deploy] workflow completed successfully"
          EOF
